version: '3.8'

services:
  # 1. Google Cloud Bigtable Emulator
  bigtable-emulator:
    image: gcr.io/google.com/cloudsdktool/google-cloud-cli:emulators
    container_name: bigtable-emulator
    ports:
      - "127.0.0.1:8089:8089"
    command: gcloud beta emulators bigtable start --host-port=0.0.0.0:8089
    restart: always

  # 2. Google Cloud Pub/Sub Emulator
  pubsub-emulator:
    image: gcr.io/google.com/cloudsdktool/google-cloud-cli:emulators
    container_name: pubsub-emulator
    ports:
      - "127.0.0.1:8085:8085"
    command: gcloud beta emulators pubsub start --host-port=0.0.0.0:8085
    restart: always

  # 3. Go Backend Application (API Server & Subscriber Worker)
  go-app:
    build: .
    container_name: minecraft-vote-go-app
    depends_on:
      - bigtable-emulator
      - pubsub-emulator
    ports:
      - "80:80"
    environment:
      - BIGTABLE_EMULATOR_HOST=bigtable-emulator:8089
      - PUBSUB_EMULATOR_HOST=pubsub-emulator:8085
      - GCP_PROJECT_ID=local-project
      - BIGTABLE_INSTANCE_ID=minecraft-instance
    restart: always

  # 4. Prometheus (Metrics Collector)
  prometheus:
    image: prom/prometheus:latest
    container_name: minecraft-vote-prometheus
    depends_on:
      - go-app
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    restart: always

  # 5. Grafana (Dashboard Visualizer)
  grafana:
    image: grafana/grafana:latest
    container_name: minecraft-vote-grafana
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
    restart: always